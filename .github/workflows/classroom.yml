name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Prueba de Cotización
      id: prueba-de-cotizacion
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Prueba de Cotización
        setup-command: javac *.java
        command: java Main
        input: |-
          ```text
          2
          2
          3
          200
          100
        expected-output: |-
          ```text
          600.0
          780.0
          1380.0
          165.6
          1545.6
        comparison-method: contains
        timeout: 1
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        PRUEBA-DE-COTIZACION_RESULTS: "${{steps.prueba-de-cotizacion.outputs.result}}"
      with:
        runners: prueba-de-cotizacion
